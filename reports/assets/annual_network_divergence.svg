<svg class="chart-svg annual-svg" viewBox="0 0 1080 410" role="img" aria-labelledby="annual-chart-title annual-chart-desc" preserveAspectRatio="xMidYMid meet"><title id="annual-chart-title">Annual network KPI divergence</title><desc id="annual-chart-desc">Complete-year means of VBB monthly punctuality and reliability, followed by the observed current year-to-date window. The two KPIs follow different patterns and are not a combined score.</desc><rect width="100%" height="100%" rx="18" fill="#fbfaf6"/><text x="78" y="30" class="svg-kicker">ANNUAL DIAGNOSIS</text><line x1="310" y1="25" x2="340" y2="25" class="annual-punctuality"/><text x="348" y="30" class="svg-legend">punctuality</text><line x1="450" y1="25" x2="480" y2="25" class="annual-reliability"/><text x="488" y="30" class="svg-legend">reliability</text><text x="615" y="30" class="svg-legend">2026 is Jan-May</text><line x1="78" y1="280.5" x2="1050" y2="280.5" class="grid-line"/><text x="66" y="284.5" text-anchor="end" class="svg-axis">92%</text><line x1="78" y1="225.5" x2="1050" y2="225.5" class="grid-line"/><text x="66" y="229.5" text-anchor="end" class="svg-axis">94%</text><line x1="78" y1="170.5" x2="1050" y2="170.5" class="grid-line"/><text x="66" y="174.5" text-anchor="end" class="svg-axis">96%</text><line x1="78" y1="115.5" x2="1050" y2="115.5" class="grid-line"/><text x="66" y="119.5" text-anchor="end" class="svg-axis">98%</text><path d="M 78.0 168.2 L 216.9 140.8 L 355.7 169.7 L 494.6 196.8 L 633.4 237.7 L 772.3 231.7 L 911.1 254.6" class="annual-punctuality"/><path d="M 911.1 254.6 L 1050.0 221.7" class="annual-punctuality annual-ytd"/><circle cx="78.0" cy="168.2" r="4.2" fill="#0f766e"><title>Punctuality 2019: 96.08%</title></circle><circle cx="216.9" cy="140.8" r="4.2" fill="#0f766e"><title>Punctuality 2020: 97.08%</title></circle><circle cx="355.7" cy="169.7" r="4.2" fill="#0f766e"><title>Punctuality 2021: 96.03%</title></circle><circle cx="494.6" cy="196.8" r="4.2" fill="#0f766e"><title>Punctuality